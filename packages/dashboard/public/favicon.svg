<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" color="white">
  <!-- The Master Rune Logo Geometry (Benchmark Runner Version) -->
  <g fill="currentColor"> <!-- Clean, tech-forward, inherits color for CSS flexibility -->
    <!-- The Telco (Stem) & Accent Swash - Merged into a single shape to eliminate 1px rendering seams -->
    <polygon points="15,20 38,20 38,80 30,80 30,28 23,28" />

    <!-- The Lúva (Bow) - Perfect geometric D-shape of uniform thickness -->
    <path d="M 38 30 
             A 20 20 0 0 1 38 70 
             L 38 60 
             A 10 10 0 0 0 38 40 Z" />

    <!-- The "I Run" Stride / Sweeping Leg - Dynamic kinetic cut extending outward -->
    <polygon points="45,55 85,85 75,88 38,65" />

    <!-- The Tehtar (Magical Vowel Mark) - 3 Ascending Diamonds -->
    <polygon points="55,18 58,15 61,18 58,21" />
    <polygon points="63,14 66,11 69,14 66,17" />
    <polygon points="71,10 74,7  77,10  74,13" />
  </g>
</svg>
