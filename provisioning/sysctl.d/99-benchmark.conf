# Benchmark appliance sysctl configuration
# Reference: LLVM Benchmarking Guidelines https://llvm.org/docs/Benchmarking.html

# Disable ASLR for reproducible memory layouts (LLVM guideline)
kernel.randomize_va_space = 0

# Disable NMI watchdog (reduces jitter on isolated cores)
kernel.nmi_watchdog = 0

# Disable timer migration (prevent timers moving between CPUs)
kernel.timer_migration = 0

# Reduce VM write pressure (avoid background flushing during benchmarks)
vm.dirty_ratio = 5
vm.dirty_background_ratio = 1

# Allow userspace access to CPU performance counters (required by @mitata/counters)
kernel.perf_event_paranoid = 2

# Note: Transparent Huge Pages are disabled via /sys, not sysctl.
# See disable-thp.service in the base role.
